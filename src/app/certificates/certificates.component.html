<div class="container">
  <div class="seccion">
    <div class="centered-container">
      <h3 class="Icon"><fa-icon [icon]="faBook"></fa-icon> Certificates</h3>
    </div>
    <div class="productos-container">
      <div *ngFor="let certificado of certificados" class="producto">
        <a [href]="certificado.img" target="_blank">
          <img [src]="certificado.img" alt="" />
          <div class="info">
            <h2>{{ certificado.description }}</h2>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
