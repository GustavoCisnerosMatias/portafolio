<div class="categorias-wrapper">
  <div *ngFor="let categoria of categorias" class="categoria-seccion">
    <div class="centered-container">
      <h3 class="Icon">
        <fa-icon [icon]="categoria.icono"></fa-icon> {{ categoria.nombre }}
      </h3>
    </div>
    <div class="productos-container">
      <div *ngFor="let certificado of categoria.certificados" class="producto">
        <a [href]="certificado.img" target="_blank">
          <img [src]="certificado.img" [alt]="certificado.description" />
          <div class="info">
            <h2>{{ certificado.description }}</h2>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
