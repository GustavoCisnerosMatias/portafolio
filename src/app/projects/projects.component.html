<div class="container">
  <div class="seccion">
    <div class="centered-container">
      <h3 class="Icon"><fa-icon [icon]="faRocket"></fa-icon> Projects</h3>
    </div>
    <div class="productos-container">
      <div *ngFor="let project of projects" class="producto">
        <!-- <img [src]="project.url" alt="" /> -->
        <a [href]="project.url" target="_blank">
          <div class="info">
            <h2>{{ project.title }}</h2>
            <p>{{ project.description }}</p>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
