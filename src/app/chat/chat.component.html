<!-- Floating button -->
<button
  (click)="toggleChat()"
  class="chat-toggle"
  [class.open]="isOpen"
  title="Chat con IA"
>
  <fa-icon [icon]="isOpen ? faTimes : faComments"></fa-icon>
</button>

<!-- Chat window -->
<div class="chat-window" [class.visible]="isOpen">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-avatar">
      <fa-icon [icon]="faRobot"></fa-icon>
    </div>
    <div class="chat-header-info">
      <span class="chat-name">Asistente de Gustavo</span>
      <span class="chat-status">
        <span class="status-dot"></span>
        IA activa
      </span>
    </div>
    <button class="chat-close" (click)="toggleChat()" aria-label="Cerrar chat">
      <fa-icon [icon]="faTimes"></fa-icon>
    </button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" #messagesContainer>
    <div *ngFor="let msg of messages" class="message-wrapper" [class.user]="msg.role === 'user'">
      <div class="message" [class.bot-msg]="msg.role === 'bot'" [class.user-msg]="msg.role === 'user'">
        <div *ngIf="msg.loading" class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span *ngIf="!msg.loading" [innerHTML]="format(msg.text)"></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <input
      type="text"
      class="chat-input"
      placeholder="Pregúntame sobre Gustavo..."
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      [disabled]="isTyping"
    />
    <button class="send-btn" (click)="sendMessage()" [disabled]="isTyping || !inputText.trim()" aria-label="Enviar mensaje">
      <fa-icon [icon]="faPaperPlane"></fa-icon>
    </button>
  </div>

</div>
